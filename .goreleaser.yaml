version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}}

dockers:
  - image_templates:
      - "ghcr.io/pokgak/beegfs-mon-prom:{{ .Tag }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    dockerfile: Dockerfile.goreleaser
    goarch: amd64
  - image_templates:
      - "ghcr.io/pokgak/beegfs-mon-prom:{{ .Tag }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    dockerfile: Dockerfile.goreleaser
    goarch: arm64

docker_manifests:
  - name_template: "ghcr.io/pokgak/beegfs-mon-prom:{{ .Tag }}"
    image_templates:
      - "ghcr.io/pokgak/beegfs-mon-prom:{{ .Tag }}-amd64"
      - "ghcr.io/pokgak/beegfs-mon-prom:{{ .Tag }}-arm64"
  - name_template: "ghcr.io/pokgak/beegfs-mon-prom:latest"
    image_templates:
      - "ghcr.io/pokgak/beegfs-mon-prom:{{ .Tag }}-amd64"
      - "ghcr.io/pokgak/beegfs-mon-prom:{{ .Tag }}-arm64"

nfpms:
  - package_name: beegfs-mon-prom
    vendor: pokgak
    homepage: https://github.com/pokgak/beegfs-mon-prom
    maintainer: pokgak
    description: BeeGFS Prometheus Exporter
    license: MIT
    formats:
      - deb
      - rpm
    dependencies:
      - beegfs-mgmtd
    bindir: /usr/bin
    contents:
      - src: packaging/systemd/beegfs-mon-prom.service
        dst: /lib/systemd/system/beegfs-mon-prom.service
      - src: packaging/default/beegfs-mon-prom
        dst: /etc/default/beegfs-mon-prom
        type: config|noreplace
    scripts:
      postinstall: packaging/scripts/postinstall.sh
      preremove: packaging/scripts/preremove.sh

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  header: |
    ## BeeGFS 8.x Support

    This is a major rewrite that drops BeeGFS 7.x (`beegfs-ctl`) support and uses the new BeeGFS 8.x CLI (`/opt/beegfs/sbin/beegfs`) with native JSON output.

    ### Breaking Changes
    - Requires BeeGFS 8.x — the `beegfs` CLI binary must be available (default: `/opt/beegfs/sbin/beegfs`)
    - All metric names have changed (see README for the new metric reference)
    - CLI flags changed: `--mgmtd` → `--mgmtd-addr`, `--config` removed, new `--auth-file`, `--tls-disable`, `--tls-cert-file`, `--beegfs-path` flags

    ### What's New
    - JSON-based data collection — no more text scraping, much more reliable
    - Target reachability metric (`beegfs_target_reachable`)
    - Unified `node_type` label (meta/storage) instead of separate metric names per node type
    - Per-target metrics now include both meta and storage targets

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
